<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajedrez Online</title>

<link rel="stylesheet" href="chess_coordenadas.css">
<link rel="stylesheet" href="ajedrez_online.css">
<link rel="stylesheet" href="aje_onl_movil.css">
</head>
<body>

<canvas id="particles"></canvas>

<h1 class="titulo">Ajedrez Online ♟</h1>

<div class="contenedor">

    <!-- Tablero izquierda -->
    <div class="zona-tablero">

        <div id="boardWrapper">

            <!-- LETRAS ARRIBA -->
            <div class="files top">
                <span></span>
                <span>a</span><span>b</span><span>c</span><span>d</span>
                <span>e</span><span>f</span><span>g</span><span>h</span>
                <span></span>
            </div>

            <div class="boardCenter">

                <!-- NUMEROS IZQUIERDA -->
                <div class="ranks left">
                    <span>8</span><span>7</span><span>6</span><span>5</span>
                    <span>4</span><span>3</span><span>2</span><span>1</span>
                </div>

                <!-- TABLERO -->
                <div id="tablero"></div>

                <!-- NUMEROS DERECHA -->
                <div class="ranks right">
                    <span>8</span><span>7</span><span>6</span><span>5</span>
                    <span>4</span><span>3</span><span>2</span><span>1</span>
                </div>

            </div>

            <!-- LETRAS ABAJO -->
            <div class="files bottom">
                <span></span>
                <span>a</span><span>b</span><span>c</span><span>d</span>
                <span>e</span><span>f</span><span>g</span><span>h</span>
                <span></span>
            </div>

        </div>

    </div>

    <!-- Panel derecha dentro de contenedor azul -->
    <div class="panel-wrapper">
        <div class="panel">

            <!-- ELECCIÓN DE COLOR -->
            <div class="bloque">
                <h3>Elije tu color de piezas:</h3>
                <div class="color-botones">
                    <button id="blancasBtn">♔ Blancas</button>
                    <button id="negrasBtn">♚ Negras</button>
                </div>
            </div>

            <!-- CREAR PARTIDA -->
            <div class="bloque">
                <button id="crearBtn">Crear Partida</button>
                <div id="codigoGenerado" class="codigo-box"></div>
            </div>

            <!-- SEPARADOR -->
            <div class="separador"></div>

            <!-- UNIRSE CON CÓDIGO -->
            <div class="bloque">
                <p class="subtitulo">
                    ¿Te invitaron con un código? <br>
                    Ingresa aquí:
                </p>
                <input type="text" id="codigoInput" placeholder="Ingresa el código...">
                <button id="unirseBtn">Unirse con código</button>
            </div>

            <!-- INFO PARTIDA -->
            <div class="info">
                <p id="estado"></p>
                <p id="turnoTexto"></p>
            </div>

        </div>
    </div>

</div>

<script src="particulas.js"></script>
<script type="module" src="ajedrez_online.js"></script>

</body>
</html>
