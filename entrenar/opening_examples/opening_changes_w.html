<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visualizador de Aperturas (Blancas)</title>

<link rel="stylesheet" href="chess_coordenadas.css">
<link rel="stylesheet" href="opening_changes.css">
</head>

<body>

<div class="titulo-wrapper">
    <button class="btn-atras" onclick="history.back()">←</button>
    <h1 class="titulo">Apertura Ejemplo</h1>
</div>

<div class="contenedor">

    <div id="boardWrapper">

        <!-- LETRAS ARRIBA -->
        <div class="files top">
            <span></span>
            <span>a</span><span>b</span><span>c</span><span>d</span>
            <span>e</span><span>f</span><span>g</span><span>h</span>
            <span></span>
        </div>

        <div class="boardCenter">

            <!-- NUMEROS IZQUIERDA -->
            <div class="ranks left">
                <span>8</span><span>7</span><span>6</span><span>5</span>
                <span>4</span><span>3</span><span>2</span><span>1</span>
            </div>

            <!-- TABLERO -->
            <div id="tablero"></div>

            <!-- NUMEROS DERECHA -->
            <div class="ranks right">
                <span>8</span><span>7</span><span>6</span><span>5</span>
                <span>4</span><span>3</span><span>2</span><span>1</span>
            </div>

        </div>

        <!-- LETRAS ABAJO -->
        <div class="files bottom">
            <span></span>
            <span>a</span><span>b</span><span>c</span><span>d</span>
            <span>e</span><span>f</span><span>g</span><span>h</span>
            <span></span>
        </div>

    </div>

    <div id="panel-info">
        <h2>Descripción de la Apertura: <span id="nombre-apertura"></span></h2>
        <p id="descripcion-apertura">Aquí se mostrará la explicación de la apertura seleccionada.</p>
    </div>

</div>

<script type="module" src="opening_changes_w.js"></script>

</body>
</html>
